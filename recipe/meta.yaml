{% set name = "xarray-sentinel" %}
{% set version = "0.9.6" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 6067627bd53dc091c7e4078504959578c4ef96e605b1b411cf2c124a3f241630

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools_scm
  run:
    - fsspec
    - python >={{ python_min }}
    - rioxarray
    - xarray >=0.18.0
    - xmlschema

test:
  imports:
    - xarray_sentinel
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bopen/xarray-sentinel
  summary: Easily explore and access the SAR data products of the Copernicus Sentinel-1 satellite mission
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - TomAugspurger
    - aurghs
    - alexamici
